services:
  cards-presentation:
    build:
      context: .
      dockerfile: src/Cards.Presentation/Dockerfile
    container_name: cards_presentation
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      Database__ConnectionString: ${CARDS_DATABASE_CONNECTION_STRING}
    networks:
      - language-cards

  mysql:
    image: mysql:8.4
    container_name: cards_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - language-cards

  language-cards-bot:
    build:
      context: .
      dockerfile: src/EnglishCardsBot.Presentation/LanguageCardsBot.Presentation/Dockerfile
    container_name: language_cards_bot
    restart: unless-stopped
    depends_on:
      cards-presentation:
        condition: service_started
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      Bot__DailySummaryTime: ${BOT_DAILY_SUMMARY_TIME:-21:00:00}
      Database__ConnectionString: ${BOT_DATABASE_CONNECTION_STRING:-Data Source=data/bot.db}
      Grpc__CardsServiceUrl: http://cards-presentation:8080
    volumes:
      - language-cards-bot-data:/app/data
    networks:
      - language-cards

networks:
  language-cards:
    name: language-cards-network
    driver: bridge

volumes:
  mysql-data:
  language-cards-bot-data:
