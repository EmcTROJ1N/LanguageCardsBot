syntax = "proto3";

package LanguageCardsBot.Contracts.v1;
option csharp_namespace = "LanguageCardsBot.Contracts.V1";

service OrderService {
  rpc GetOrder (GetOrderRequest) returns (GetOrderResponse);
}

message GetOrderRequest {
  string id = 1;
}

message GetOrderResponse {
  string id = 1;
  string number = 2;
}